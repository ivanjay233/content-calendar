[wheel]
universal = 1

[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist,.venv
extend-ignore = E203, W503

[coverage:run]
source = content_calendar
omit = */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    raise NotImplementedError
    if __name__ == .__main__.:
